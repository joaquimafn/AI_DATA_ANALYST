version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: ai-data-analyst-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ai_analyst}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_analyst_secret}
      POSTGRES_DB: ${POSTGRES_DB:-ai_analyst_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai_analyst}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai-data-analyst-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data:
